<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>خطأ بالنظام</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body data-page="error-page">
    <div class="page-bg" aria-hidden="true">
      <span class="glow glow-one"></span>
      <span class="glow glow-two"></span>
    </div>

    <div class="page center-box">
      <section class="section-card" style="text-align: center; padding: 2rem 1rem">
        <span class="badge badge-danger">System Error</span>
        <h1 class="error-title" style="margin-top: 0.8rem">حدث خطأ غير متوقع</h1>
        <p class="hero-sub" style="margin-top: 0.5rem">
          تعذر تحميل البيانات أو معالجة الطلب. يرجى إعادة المحاولة أو العودة للرئيسية.
        </p>
        <div class="top-actions" style="justify-content: center; margin-top: 1rem">
          <button id="retry-error-btn" class="btn btn-primary" aria-label="إعادة المحاولة">إعادة المحاولة</button>
          <a href="index.html" class="btn btn-secondary" aria-label="العودة للرئيسية">الرئيسية</a>
        </div>
      </section>
    </div>

    <script src="assets/app.js" defer></script>
  </body>
</html>
