<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منصة أوقاف مدكر</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shape shape-a"></div>
    <div class="shape shape-b"></div>
    <main class="container">
      <header class="hero">
        <p class="eyebrow">جمعية مدكر لتحفيظ القرآن الكريم</p>
        <h1>منصة تحويل الراغب بالوقف إلى واقف فعلي</h1>
        <p class="subtitle">
          اختر مسارك المناسب، أجب عن الأسئلة، وسيتم إصدار رقم طلب مع آلية متابعة واضحة.
        </p>
      </header>

      <section class="tabs" aria-label="التنقل">
        <button id="tab-start" class="tab-btn active" type="button">بدء طلب جديد</button>
        <button id="tab-track" class="tab-btn" type="button">متابعة طلب</button>
      </section>

      <section id="start-view" class="panel active" aria-labelledby="tab-start">
        <div id="options-grid" class="options-grid"></div>

        <form id="question-form" class="question-form hidden" novalidate>
          <h2 id="form-title"></h2>
          <p id="form-description" class="form-description"></p>
          <div id="form-fields" class="form-fields"></div>
          <div class="actions">
            <button type="button" id="back-to-options" class="btn btn-secondary">رجوع للخيارات</button>
            <button type="submit" class="btn btn-primary">إرسال الطلب</button>
          </div>
        </form>

        <section id="result-card" class="result-card hidden" aria-live="polite"></section>
      </section>

      <section id="track-view" class="panel" aria-labelledby="tab-track">
        <form id="track-form" class="track-form" novalidate>
          <label for="request-number">رقم الطلب</label>
          <input
            id="request-number"
            name="request-number"
            type="text"
            placeholder="مثال: MDK-WQF-20260413-0001"
            required
          />
          <button type="submit" class="btn btn-primary">متابعة</button>
        </form>

        <section id="track-result" class="track-result" aria-live="polite"></section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
