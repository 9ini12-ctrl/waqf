<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>لوحة إدارة الطلبات - منصة الأوقاف</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              tajawal: ["Tajawal", "sans-serif"]
            },
            boxShadow: {
              soft: "0 2px 10px rgba(18, 26, 38, 0.07)",
              card: "0 8px 22px rgba(18, 26, 38, 0.08)"
            },
            colors: {
              waqf: {
                50: "#f5f7fb",
                100: "#e9edf5",
                200: "#d6deea",
                300: "#bac8dc",
                400: "#8ea2bf",
                500: "#677d9e",
                600: "#4b5f7c",
                700: "#34465f",
                800: "#243246",
                900: "#121a26"
              },
              accent: {
                50: "#eef6ff",
                100: "#d9ebff",
                200: "#b6d9ff",
                500: "#0a84ff",
                600: "#0077ed",
                700: "#0068d1"
              }
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-b from-white via-waqf-50 to-waqf-100 font-tajawal text-waqf-900">
    <div class="pointer-events-none fixed inset-0 overflow-hidden">
      <div class="absolute -right-24 top-8 h-80 w-80 rounded-full bg-accent-500/10 blur-3xl"></div>
      <div class="absolute -left-20 bottom-8 h-72 w-72 rounded-full bg-waqf-400/20 blur-3xl"></div>
    </div>

    <main class="mx-auto max-w-7xl px-4 py-6 md:py-10">
      <header class="relative rounded-3xl border border-white/70 bg-white/85 p-5 shadow-soft backdrop-blur md:p-7">
        <div class="flex flex-wrap items-start justify-between gap-3">
          <div>
            <p class="text-xs font-bold tracking-wide text-waqf-700">جمعية مدكر لتحفيظ القرآن الكريم</p>
            <h1 class="mt-2 text-2xl font-extrabold md:text-3xl">لوحة إدارة الطلبات</h1>
          </div>
          <a
            href="/index.html"
            class="rounded-full border border-waqf-300 bg-white px-4 py-2 text-xs font-bold text-waqf-800 transition hover:border-accent-500 hover:text-accent-700"
            >العودة للمنصة</a
          >
        </div>
        <p class="mt-3 text-sm leading-7 text-waqf-700">عرض الطلبات، تحديث الحالة، وإضافة سجل متابعة من مكان واحد.</p>
      </header>

      <section
        id="admin-alert"
        class="mt-4 hidden rounded-2xl border border-accent-200 bg-accent-50 px-4 py-3 text-sm font-semibold text-accent-700"
      ></section>

      <section id="auth-panel" class="mt-4 rounded-3xl border border-white/70 bg-white/90 p-5 shadow-soft backdrop-blur md:max-w-xl">
        <h2 class="text-base font-extrabold text-waqf-900">دخول الإدارة</h2>
        <p class="mt-1 text-sm text-waqf-700">أدخل رمز الدخول الإداري للوصول إلى لوحة الطلبات.</p>
        <div class="mt-4 space-y-3">
          <label class="block space-y-2">
            <span class="text-sm font-bold text-waqf-900">رمز الدخول</span>
            <input
              id="admin-token-input"
              type="password"
              class="w-full rounded-2xl border border-waqf-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-accent-500/40 focus:ring-2 focus:ring-accent-500/25"
              placeholder="Admin Token"
            />
          </label>
          <button id="admin-login-btn" type="button" class="rounded-2xl bg-accent-600 px-4 py-2 text-sm font-bold text-white shadow-card">دخول</button>
        </div>
      </section>

      <section id="dashboard" class="mt-4 hidden space-y-4">
        <div class="rounded-3xl border border-white/70 bg-white/90 p-4 shadow-soft backdrop-blur">
          <div class="grid gap-3 md:grid-cols-[1fr,220px,auto,auto] md:items-end">
            <label class="block space-y-2">
              <span class="text-sm font-bold text-waqf-900">بحث</span>
              <input
                id="admin-search"
                type="text"
                class="w-full rounded-2xl border border-waqf-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-accent-500/40 focus:ring-2 focus:ring-accent-500/25"
                placeholder="رقم الطلب / الاسم / الجوال"
              />
            </label>
            <label class="block space-y-2">
              <span class="text-sm font-bold text-waqf-900">الحالة</span>
              <select
                id="admin-status"
                class="w-full rounded-2xl border border-waqf-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-accent-500/40 focus:ring-2 focus:ring-accent-500/25"
              >
                <option value="all">الكل</option>
                <option value="قيد الدراسة الأولية">قيد الدراسة الأولية</option>
                <option value="قيد التواصل العاجل">قيد التواصل العاجل</option>
                <option value="مؤهل للعرض على اللجنة">مؤهل للعرض على اللجنة</option>
                <option value="بانتظار استكمال المتطلبات">بانتظار استكمال المتطلبات</option>
                <option value="قيد اعتماد نقل النظارة">قيد اعتماد نقل النظارة</option>
                <option value="بانتظار مستندات رسمية">بانتظار مستندات رسمية</option>
                <option value="بانتظار جدولة الدفعات">بانتظار جدولة الدفعات</option>
                <option value="بانتظار تفعيل المساهمة الشهرية">بانتظار تفعيل المساهمة الشهرية</option>
                <option value="بانتظار إصدار الفاتورة">بانتظار إصدار الفاتورة</option>
                <option value="مكتمل">مكتمل</option>
                <option value="مرفوض">مرفوض</option>
              </select>
            </label>
            <button id="admin-refresh" type="button" class="rounded-2xl bg-accent-600 px-4 py-2 text-sm font-bold text-white">تحديث</button>
            <button id="admin-logout" type="button" class="rounded-2xl border border-waqf-300 bg-white px-4 py-2 text-sm font-bold text-waqf-900">خروج</button>
          </div>
          <p id="requests-count" class="mt-3 text-xs font-bold text-waqf-700"></p>
        </div>

        <div class="grid gap-4 lg:grid-cols-[380px,1fr]">
          <section class="rounded-3xl border border-white/70 bg-white/90 p-4 shadow-soft backdrop-blur">
            <h3 class="text-sm font-extrabold text-waqf-900">قائمة الطلبات</h3>
            <div id="requests-list" class="mt-3 max-h-[65vh] space-y-2 overflow-y-auto pr-1"></div>
          </section>

          <section class="rounded-3xl border border-white/70 bg-white/90 p-4 shadow-soft backdrop-blur">
            <div
              id="detail-empty"
              class="rounded-2xl border border-dashed border-waqf-300 bg-waqf-50 px-4 py-8 text-center text-sm font-semibold text-waqf-700"
            >
              اختر طلبًا من القائمة لعرض التفاصيل والتحديث.
            </div>

            <div id="detail-panel" class="hidden space-y-4">
              <div>
                <h3 id="detail-request-number" class="text-base font-extrabold text-waqf-900"></h3>
                <p id="detail-meta" class="mt-1 text-xs font-semibold text-waqf-700"></p>
              </div>

              <div id="detail-summary" class="grid gap-2"></div>

              <div>
                <h4 class="text-sm font-extrabold text-waqf-900">سجل الحالة</h4>
                <div id="detail-timeline" class="mt-2 max-h-52 space-y-2 overflow-y-auto"></div>
              </div>

              <div class="grid gap-3 rounded-2xl border border-waqf-200 bg-waqf-50 p-3">
                <h4 class="text-sm font-extrabold text-waqf-900">تحديث الطلب</h4>

                <label class="block space-y-1">
                  <span class="text-xs font-bold text-waqf-900">الحالة الجديدة</span>
                  <select
                    id="update-status"
                    class="w-full rounded-2xl border border-waqf-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-accent-500/40 focus:ring-2 focus:ring-accent-500/25"
                  ></select>
                </label>

                <label class="block space-y-1">
                  <span class="text-xs font-bold text-waqf-900">التوصية</span>
                  <textarea
                    id="update-recommendation"
                    rows="3"
                    class="w-full rounded-2xl border border-waqf-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-accent-500/40 focus:ring-2 focus:ring-accent-500/25"
                  ></textarea>
                </label>

                <label class="block space-y-1">
                  <span class="text-xs font-bold text-waqf-900">المطلوب حاليًا (كل سطر إجراء)</span>
                  <textarea
                    id="update-actions"
                    rows="4"
                    class="w-full rounded-2xl border border-waqf-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-accent-500/40 focus:ring-2 focus:ring-accent-500/25"
                  ></textarea>
                </label>

                <label class="block space-y-1">
                  <span class="text-xs font-bold text-waqf-900">ملاحظة التحديث (تضاف لسجل الحالة)</span>
                  <textarea
                    id="update-note"
                    rows="3"
                    class="w-full rounded-2xl border border-waqf-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-accent-500/40 focus:ring-2 focus:ring-accent-500/25"
                    placeholder="مثال: تم التواصل مع مقدم الطلب وتحديد موعد اجتماع."
                  ></textarea>
                </label>

                <button id="admin-save-btn" type="button" class="rounded-2xl bg-accent-600 px-4 py-2 text-sm font-bold text-white">
                  حفظ التحديث
                </button>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
